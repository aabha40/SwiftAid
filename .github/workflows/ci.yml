name: SwiftAid CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check server syntax
        run: |
          node --check server/index.js
          node --check server/config/db.js
          node --check server/services/geoMatch.js
          node --check server/services/hospitalScore.js
          node --check server/services/eta.js
          echo "✅ All server files have valid syntax"

      - name: Run algorithm unit tests
        run: node -e "
          const { calculateETA } = require('./server/services/eta');
          const { haversineDistance } = require('./server/services/hospitalScore');
          
          // ETA tests
          console.assert(calculateETA(10) === 15, 'ETA 10km should be 15 mins');
          console.assert(calculateETA(40) === 60, 'ETA 40km should be 60 mins');
          console.assert(calculateETA(0) === 0, 'ETA 0km should be 0 mins');
          
          // Haversine tests
          const d = haversineDistance(21.2514, 81.6296, 21.2514, 81.6296);
          console.assert(d === 0, 'Same point distance should be 0');
          
          // Priority scores
          const scores = { cardiac:100, trauma:80, respiratory:70, general:50, non_emergency:10 };
          console.assert(scores.cardiac > scores.trauma, 'Cardiac must beat trauma');
          console.assert(scores.trauma > scores.general, 'Trauma must beat general');
          
          console.log('✅ All algorithm tests passed!');
        "

      - name: Verify critical files exist
        run: |
          test -f server/index.js && echo "✅ index.js"
          test -f server/config/db.js && echo "✅ db.js"
          test -f server/services/geoMatch.js && echo "✅ geoMatch.js"
          test -f server/services/hospitalScore.js && echo "✅ hospitalScore.js"
          test -f server/services/eta.js && echo "✅ eta.js"
          test -f Dockerfile && echo "✅ Dockerfile"
          test -f .env.example && echo "✅ .env.example"
          test -f README.md && echo "✅ README.md"
          echo "✅ All critical files present"